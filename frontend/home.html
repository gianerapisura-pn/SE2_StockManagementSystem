<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1800 Soles | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="home">
  <aside class="sidebar">
    <div class="brand"><img src="/images/logo.png" alt="1800 Soles logo"><span>1800<br>SOLES</span></div>
    <div class="menu">
      <a data-page="home" class="active" href="/home.html"><i class="fa fa-house"></i> HOME</a>
      <a data-page="inventory" href="/inventory.html"><i class="fa fa-box"></i> INVENTORY</a>
      <a data-page="analytics" href="/analytics.html"><i class="fa fa-chart-column"></i> ANALYTICS</a>
      <a data-page="settings" href="/settings.html"><i class="fa fa-gear"></i> SETTINGS</a>
    </div>
    <div class="logout">
      <button id="logoutBtn"><i class="fa fa-right-from-bracket"></i> LOG OUT</button>
    </div>
  </aside>

  <main class="content">
    <section>
      <h1 class="page-title center-title">Welcome back, <span id="welcomeName"></span></h1>
      <p class="page-sub center-sub">Here's what's happening with your inventory today</p>

      <div class="cards-grid" id="homeStats"></div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
          <h3 style="margin:0;">Recent Activity</h3>
          <span class="mini-pill">Last 5 Actions</span>
        </div>
        <div id="recentActivity" class="recent-list"></div>
      </div>

      <div class="home-overview-grid">
        <div class="card">
          <h3 class="chart-title">Sales Overview</h3>
          <div class="chart-sub">Recent sales activity</div>
          <canvas id="homeSalesOverview"></canvas>
        </div>
        <div class="card home-stock-summary-card">
          <h3 class="chart-title">Stock Status Summary</h3>
          <div class="chart-sub">Current stock levels</div>
          <div id="homeStockStatusText" class="stock-summary-text"></div>
        </div>
      </div>
    </section>
  </main>

  
  <template id="activityDetailModalTemplate">
    <div class="modal-shell modal-activity-details">
      <div class="modal-header">
        <h2>Activity Details</h2>
        <button class="close-btn" type="button" data-close-modal>&times;</button>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Action</label><input class="input" id="adAction" disabled></div>
        <div class="form-group"><label>Date/Time</label><input class="input" id="adDateTime" disabled></div>
        <div class="form-group"><label>Item</label><input class="input" id="adItem" disabled></div>
        <div class="form-group"><label>Quantity</label><input class="input" id="adQty" disabled></div>
        <div class="form-group"><label>Sold Price</label><input class="input" id="adSoldPrice" disabled></div>
        <div class="form-group"><label>Description</label><input class="input" id="adDescription" disabled></div>
      </div>
    </div>
  </template>

  <div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="genericModal"></div></div>
  <div class="toast" id="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
