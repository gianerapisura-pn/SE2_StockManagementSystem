<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1800 Soles | Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <section class="auth-hero">
      <div class="brand-mark">
        <img src="/images/logo.png" alt="1800 Soles logo">
      </div>
      <h1>Reset Password</h1>
      <p>Set a new password for your account</p>
    </section>

    <section class="auth-card">
      <h2 class="form-title">Create New Password</h2>
      <p class="form-sub">Use a strong password with upper/lowercase, number, and special character.</p>

      <div class="form-group">
        <label>New Password *</label>
        <input type="password" class="input" id="rpPass" placeholder="At least 8 chars, uppercase, lowercase, number, special">
      </div>
      <div class="form-group">
        <label>Confirm Password *</label>
        <input type="password" class="input" id="rpPass2" placeholder="Repeat new password (must match)">
      </div>

      <button class="primary-btn" id="resetBtn">Reset Password</button>
      <div style="text-align:center; margin-top:8px;">Back to <a href="/index.html">Log in</a></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/reset-password.js"></script>
</body>
</html>
